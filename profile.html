<!DOCTYPE html>
<html lang="fr">
<head>
	<title>Top games Catalogue</title>
	<meta charset="UTF-8">

	<!-- Stylesheets -->
	<link rel="stylesheet" href="css/bootstrap.min.css"/>
	<link rel="stylesheet" href="css/font-awesome.min.css"/>
	<link rel="stylesheet" href="css/owl.carousel.css"/>
	<link rel="stylesheet" href="css/style.css"/>
	<link rel="stylesheet" href="css/animate.css"/>


	<!--[if lt IE 9]>
	  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
	  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->

</head>
<body>

	<!-- Menu-->
	<header class="header-section">
		<div class="container">
			<!-- logo -->
			<a class="site-logo" href="gamecontroller.php?p=home">
				<img src="img/logo.png" alt="">
			</a>

			<!--Login-->
			<div class="user-panel">
				<div [onshow;block=div;when [var.statut]=='visiteur']>
					<a href="login.php">Login</a> / <a href="login.php?mode=register">Register</a>
				</div>

				<div [onshow;block=div;when [var.statut]=='connecte']>
					<a href="#" style="color: #ffffff;">
						<i class="fa fa-user-circle"></i> [var.pseudo_tbs]
					</a>
					<span style="color: #fff;"> | </span>
					<a href="logout.php" style="font-size: 12px; color: #aaa;">Logout</a>
				</div>
			</div>

			<!-- Menu -->
			<nav class="main-menu">
				<ul>
					<li><a href="gamecontroller.php?p=home">Home</a></li>
					<li><a href="gamecontroller.php?p=games">Games</a></li>
					<li><a href="gamecontroller.php?p=categories">Blog</a></li>
				</ul>
			</nav>
		</div>
	</header>

<section class="page-section spad">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="profile-card" style="background: #2a114d; padding: 40px; border-radius: 15px; color: white; text-align: center;">
                    <div class="profile-icon mb-4">
                        <i class="fa fa-user-circle fa-5x" style="color: #ffb320;"></i>
                    </div>
                    
                    <h2 class="mb-2">[user.username]</h2>
                    <p class="text-muted" style="color: #aaa !important;">Membre de la communauté Top Games</p>
                    
                    <hr style="border-top: 1px solid #444; width: 50%; margin: 30px auto;">
                    
                    <div class="profile-info" style="text-align: left; max-width: 400px; margin: 0 auto;">
                        <p><strong><i class="fa fa-envelope" style="color: #ffb320;"></i> Email :</strong> [user.email]</p>
                        <p><strong><i class="fa fa-id-badge" style="color: #ffb320;"></i> ID Compte :</strong> #[user.id]</p>
                    </div>

                    <div class="mt-5">
                        <a href="gamecontroller.php?p=home" class="site-btn btn-sm">Retour à l'accueil</a>
                        <a href="logout.php" class="site-btn btn-sm" style="background: #ff4444;">Déconnexion</a>
                    </div>
                    <h3 class="mt-5 mb-4" style="color: #ffb320;">Mes Jeux Favoris</h3>
                        <div class="row">
                            <div class="col-md-4 mb-3" [fav;block=div]>
                                <div style="background: #3b1c63; border-radius: 10px; overflow: hidden;">
                                    <img src="img/recent-game/[fav.image]" style="width: 100%; height: 100px; object-fit: cover;">
                                    <p style="padding: 10px; margin: 0; font-size: 14px;">[fav.titre]</p>
                                </div>
                            </div>
                            <p [onshow;showif [fav.#]==0;magnet=p]>Vous n'avez pas encore de favoris.</p>
                        </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
