<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Top games Catalogue</title>
    <meta charset="UTF-8">
    <!-- Stylesheets -->
	<link rel="stylesheet" href="css/bootstrap.min.css"/>
	<link rel="stylesheet" href="css/font-awesome.min.css"/>
	<link rel="stylesheet" href="css/owl.carousel.css"/>
	<link rel="stylesheet" href="css/style.css"/>
	<link rel="stylesheet" href="css/animate.css"/>

    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
    <!-- Menu-->
    <header class="header-section">
        <div class="container">
            <!-- logo -->
            <a class="site-logo" href="gamecontroller.php?p=home">
                <img src="img/logo.png" alt="">
            </a>
            <!--Login-->
            <div class="user-panel">
                <div [onshow;block=div;when [var.statut]=='visiteur']>
                    <a href="login.php">Login</a> / <a href="login.php?mode=register">Register</a>
                </div>
                <div [onshow;block=div;when [var.statut]=='connecte']>
                    <a href="#" class="user-panel-pseudo">
                        <i class="fa fa-user-circle"></i> [var.pseudo_tbs]
                    </a>
                    <span class="user-panel-sep"> | </span>
                    <a href="logout.php" class="user-panel-logout">Logout</a>
                </div>
            </div>
            <!-- Menu -->
            <nav class="main-menu">
                <ul>
                    <li><a href="gamecontroller.php?p=home">Home</a></li>
                    <li><a href="gamecontroller.php?p=games">Games</a></li>
                    <li><a href="gamecontroller.php?p=categories">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-section spad">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="profile-card">
                        <div class="profile-icon">
                            <i class="fa fa-user-circle fa-5x"></i>
                        </div>

                        <h2 class="profile-username">[user.username]</h2>
                        <p class="profile-subtitle">Membre de la communauté Top Games</p>

                        <hr class="profile-divider">

                        <div class="profile-info">
                            <p><strong><i class="fa fa-envelope"></i> Email :</strong> [user.email]</p>
                            <p><strong><i class="fa fa-id-badge"></i> ID Compte :</strong> #[user.id]</p>
                        </div>

                        <div class="profile-actions">
                            <a href="gamecontroller.php?p=home" class="site-btn btn-sm">Retour à l'accueil</a>
                            <a href="logout.php" class="site-btn btn-sm btn-danger">Déconnexion</a>
                        </div>

                        <h3 class="profile-fav-title">[Mes Jeux Favoris]</h3>

                        <div class="row">
                            <div class="col-md-4 mb-3" [fav;block=div]>
                                <div class="fav-game-card">
                                    <img src="img/recent-game/[fav.image]" class="fav-game-img" alt="[fav.titre]">
                                    <p class="fav-game-title">[fav.titre]</p>
                                </div>
                            </div>
                            <p [onshow;showif [fav.#]==0;magnet=p]>Vous n'avez pas encore de favoris.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
